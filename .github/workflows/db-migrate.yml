name: DB migrate

# Runs automatically when new migration files land on main (e.g. after you sync
# your fork from upstream), and can also be triggered by hand. The Vercel
# prebuild applies migrations too, but that step is best-effort/non-fatal — this
# workflow is the reliable, fail-loud path.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-migrate.yml"
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to apply migrations to PROD'
        required: true
        default: "no"

jobs:
  migrate:
    # Auto-run on push; on manual dispatch require an explicit "yes".
    if: ${{ github.event_name == 'push' || github.event.inputs.confirm == 'yes' }}
    runs-on: ubuntu-latest
    concurrency: db-migrate
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
      - name: Apply migrations
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
