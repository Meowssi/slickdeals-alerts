name: Deploy edge functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-functions.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-functions
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy notifier
        run: supabase functions deploy notifier --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
      - name: Deploy telegram-webhook
        run: supabase functions deploy telegram-webhook --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
      - name: Deploy channel-verify
        run: supabase functions deploy channel-verify --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
      - name: Deploy send-test
        run: supabase functions deploy send-test --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
      - name: Deploy poll
        run: supabase functions deploy poll --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
      - name: Deploy refresh-scores
        run: supabase functions deploy refresh-scores --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
