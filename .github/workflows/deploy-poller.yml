name: Deploy poller

on:
  push:
    branches: [main]
    paths:
      - "apps/poller/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-poller.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-poller
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only -c apps/poller/fly.toml --dockerfile apps/poller/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
