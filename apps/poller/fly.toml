# Fly.io app config. Rename `app` after `fly launch`.
app = "slickdeals-alerts-poller"
primary_region = "sea"   # change to your closest region

[build]
  dockerfile = "Dockerfile"
  build-target = "runtime"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  POLL_INTERVAL_SECONDS = "30"
  POLL_MAX_CONCURRENT = "2"
  LOG_LEVEL = "info"

# One persistent machine. We do NOT auto-stop; the loop runs continuously.
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
